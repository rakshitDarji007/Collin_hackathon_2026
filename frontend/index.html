<!DOCTYPE html>
<html lang='en'>
  <head>
    <link rel="stylesheet" href="main.css">
    <meta. name="viewport" content="width=device-width", initial-scale="1.0">
    <meta charset='utf-8' />
   
        
    
    <script src='https://cdn.jsdelivr.net/npm/fullcalendar@6.1.20/index.global.min.js'></script>
    <script src='test.js'></script>
    <script>

      document.addEventListener('DOMContentLoaded', function() {
        var calendarEl = document.getElementById('calendar');
        var calendar = new FullCalendar.Calendar(calendarEl, {
          initialView: 'dayGridMonth'
        });
        calendar.render();
      });

    </script>
  </head>
  <body>
    <div id="taskContainer" class="space-y-4 mt-4"></div>
     <div class="calender" style="text-align: center;">
        <h1 id="header">To-Do</h1><br>
        <!--Buttons-->
      
        <label id="task">My Tasks</label>
        <input id="myText">
        <button id="button2">Button</button>
        
        <div id="items">
          <div class="item">
            <input type="checkbox" class="item-completed">
            <input type="text" class="item-description" placeholder="Enter Your Task...">
          </div>
        </div>
        <div id="button-container">
            <button id="button">Enter</button>
            <button id="tbutton">Time</button>
            <button id="dbutton">Days</button>
            
            <a href="https://silver-space-disco-5g5w6w59pq9gh7rvx-5000.app.github.dev/reshuffle">
              <button id="rbutton">Reshuffle</button>
            </a>
        </div>
     </div>
     
     
    
    <div id='calendar'></div>
  </body>
</html>
